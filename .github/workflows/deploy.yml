name: Deploy ACC Tools

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C "C:\MCE\GitHub\acc-tools" pull origin master

      - name: Rebuild and restart ACC containers
        run: |
          cd C:\MCE\GitHub\mce-tools
          docker compose build acc-webapp acc-api acc-scraper-worker
          docker compose up -d --no-deps acc-webapp acc-api acc-scraper-worker
          echo "Deploy complete"
